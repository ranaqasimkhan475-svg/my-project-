name: Hourly AI Image Post

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate image and post to Facebook
        env:
          FB_PAGES: ${{ secrets.FB_PAGES }}
        run: python generate_and_post.py

      - name: Save state file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state.json [skip ci]"
          git push
