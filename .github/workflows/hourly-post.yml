name: Hourly AI Image Post

on:
  schedule:
    - cron: '0 * * * *'   # har ghante ke shuru mein chalega (UTC time)
  workflow_dispatch:        # manually bhi "Run workflow" button se chala sakte hain

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate image and post to Facebook
        env:
          FB_PAGES: ${{ secrets.FB_PAGES }}
        run: python generate_and_post.py
